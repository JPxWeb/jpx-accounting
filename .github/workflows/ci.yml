name: CI

on:
  pull_request:
    branches: [main]
    # `labeled` is included so adding the `run-e2e` label retriggers CI and the gated E2E job actually fires.
    # Removing a label also fires `unlabeled`, but the E2E job's `if:` re-evaluates and simply skips, so no extra cost.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.29.2"

jobs:
  check:
    name: Typecheck & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint + format before typecheck — fast feedback; aligns with root eslint.config.mjs (Next flat + typescript-eslint).
      - name: Lint
        run: pnpm lint

      # Mirrors root `pnpm check` — a missing sv/en key must fail CI, not first surface at runtime.
      - name: Check i18n parity
        run: corepack pnpm check:i18n

      - name: Prettier check
        run: pnpm format:check

      - name: Typecheck all packages
        run: pnpm typecheck

      # Matches root `pnpm check` — tests/ has its own tsconfig (see tests/tsconfig.json).
      - name: Typecheck tests directory
        run: pnpm typecheck:tests

      - name: Run unit tests
        run: pnpm test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all
        run: pnpm build

  bicep:
    name: Bicep Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # az is preinstalled on ubuntu runners. Compiling here means a template that dies at the
      # ARM step (like the former invalid assert()) can never merge again.
      - name: Compile Bicep template
        run: az bicep build --file infra/azure/main.bicep --stdout > /dev/null

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    # pw:webserver logs make the documented intermittent webserver hang diagnosable from the run log.
    env:
      DEBUG: pw:webserver
    # Opt-in on PRs (apply the `run-e2e` label), automatic on main pushes (final pre-deploy gate),
    # and manually triggerable via the Actions UI. Avoids burning ~5 min per push on routine PRs.
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      # E2E servers expect demo/proxy env inlined at build time (playwright.config.ts).
      - name: Build for E2E
        run: pnpm build:e2e

      # Visual specs compare against the committed *-linux.png baselines, generated in the
      # pinned Playwright Docker image (workflow: scripts/visual-baselines.md). If they all
      # fail with "snapshot doesn't exist", the linux baselines were not regenerated.
      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # Closes the "failed silently for weeks" hole: any red job files/updates a tracking issue.
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [check, build, bicep, e2e]
    if: failure()
    timeout-minutes: 15
    permissions:
      issues: write
    steps:
      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TITLE="CI/deploy failure on ${{ github.workflow }}"
          BODY="Workflow **${{ github.workflow }}** failed on \`${{ github.ref_name }}\` at ${{ github.sha }}.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
