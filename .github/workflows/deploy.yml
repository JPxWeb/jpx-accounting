name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
      runtimeMode:
        description: "Runtime mode"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - demo

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.29.2"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all
        run: pnpm build

      - name: Package web standalone
        run: |
          cd apps/web
          # Use cp -rL to dereference ALL pnpm symlinks into real files
          # This is critical for Azure App Service deployment where symlinks break
          cp -rL .next/standalone ../../web-deploy
          cp -rL .next/static ../../web-deploy/apps/web/.next/static
          if [ -d public ]; then cp -rL public ../../web-deploy/apps/web/public; fi

          # Remove .pnpm store since all symlinks are now dereferenced
          rm -rf ../../web-deploy/node_modules/.pnpm

      - name: Fix @swc/helpers exports for Azure
        run: |
          # @swc/helpers uses package.json "exports" to map "./_/xxx" -> "./cjs/xxx.cjs"
          # but there is NO physical "_/" directory. Azure App Service runtime
          # does not resolve the exports field correctly.
          # Fix: create physical "_/" directory with the actual helper files.

          echo "=== Debug: searching for @swc/helpers ==="
          find web-deploy -path "*/@swc/helpers" -type d 2>/dev/null || echo "No @swc/helpers dirs found"
          echo ""
          echo "=== Debug: searching for any _interop_require_default files ==="
          find web-deploy -name "_interop_require_default*" 2>/dev/null | head -5 || echo "None found"
          echo ""

          # Find @swc/helpers package directories (look for package.json)
          HELPERS_PKGS=$(find web-deploy -path "*/@swc/helpers/package.json" 2>/dev/null)

          if [ -z "$HELPERS_PKGS" ]; then
            echo "WARNING: No @swc/helpers package.json found in web-deploy"
            echo "Listing all @swc directories:"
            find web-deploy -path "*/@swc" -type d 2>/dev/null || echo "No @swc dirs at all"
            echo ""
            echo "Listing node_modules structure (depth 3):"
            find web-deploy -name "node_modules" -type d -maxdepth 4 2>/dev/null

            # Fallback: copy from workspace node_modules
            echo ""
            echo "=== Fallback: copying @swc/helpers from workspace ==="
            SWC_SRC=$(find node_modules -path "*/@swc/helpers" -type d ! -path "*/node_modules/.pnpm/*" 2>/dev/null | head -1)
            if [ -z "$SWC_SRC" ]; then
              SWC_SRC=$(find node_modules/.pnpm -path "*/@swc/helpers" -type d 2>/dev/null | head -1)
            fi

            if [ -n "$SWC_SRC" ]; then
              echo "Found workspace @swc/helpers at: $SWC_SRC"
              echo "Contents:"
              ls -la "$SWC_SRC"

              for DEST_BASE in web-deploy/node_modules web-deploy/apps/web/node_modules; do
                DEST="$DEST_BASE/@swc/helpers"
                mkdir -p "$DEST"
                cp -rL "$SWC_SRC/"* "$DEST/" 2>/dev/null || true
                echo "Copied to: $DEST"
                ls "$DEST" | head -5
              done
            else
              echo "ERROR: @swc/helpers not found anywhere"
              exit 1
            fi
          fi

          # Now find all @swc/helpers directories and create _/ in each
          for PKG_JSON in $(find web-deploy -path "*/@swc/helpers/package.json" 2>/dev/null); do
            HELPERS_DIR=$(dirname "$PKG_JSON")
            echo "Processing: $HELPERS_DIR"
            echo "  Contents: $(ls "$HELPERS_DIR" | tr '\n' ' ')"

            # Look for cjs directory with .cjs files
            CJS_DIR="$HELPERS_DIR/cjs"
            if [ -d "$CJS_DIR" ]; then
              echo "  Found cjs/ directory"
              mkdir -p "$HELPERS_DIR/_"
              for f in "$CJS_DIR/"*.cjs; do
                [ -f "$f" ] || continue
                name=$(basename "$f" .cjs)
                cp "$f" "$HELPERS_DIR/_/$name.cjs"
                cp "$f" "$HELPERS_DIR/_/$name.js"
              done
              echo "  Created _/ with $(ls "$HELPERS_DIR/_/" | wc -l) files"
            else
              echo "  No cjs/ directory found, looking for .cjs files recursively"
              # Maybe files are at a different location
              CJS_FILES=$(find "$HELPERS_DIR" -name "*.cjs" 2>/dev/null | head -1)
              if [ -n "$CJS_FILES" ]; then
                CJS_PARENT=$(dirname "$CJS_FILES")
                echo "  Found .cjs files in: $CJS_PARENT"
                mkdir -p "$HELPERS_DIR/_"
                for f in "$CJS_PARENT/"*.cjs; do
                  [ -f "$f" ] || continue
                  name=$(basename "$f" .cjs)
                  cp "$f" "$HELPERS_DIR/_/$name.cjs"
                  cp "$f" "$HELPERS_DIR/_/$name.js"
                done
                echo "  Created _/ with $(ls "$HELPERS_DIR/_/" | wc -l) files"
              else
                echo "  WARNING: No .cjs files found at all in $HELPERS_DIR"
                echo "  Full tree:"
                find "$HELPERS_DIR" -type f | head -20
              fi
            fi
          done

          echo ""
          echo "=== Final Verification ==="
          echo "--- @swc/helpers _/ directories ---"
          find web-deploy -path "*/@swc/helpers/_" -type d 2>/dev/null
          echo "--- Sample _/ contents ---"
          find web-deploy -path "*/@swc/helpers/_/_interop_require_default*" 2>/dev/null || echo "NOT FOUND"

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-deploy
          path: web-deploy/
          retention-days: 3

      - name: Bundle API for production
        run: |
          mkdir -p api-deploy
          pnpm dlx esbuild services/api/src/index.ts \
            --bundle \
            --platform=node \
            --format=esm \
            --outfile=api-deploy/server.mjs \
            --banner:js="import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
          echo '{"type": "module"}' > api-deploy/package.json

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-deploy
          path: api-deploy/
          retention-days: 3

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@v2
        id: bicep
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: jpx-main-rg
          template: infra/azure/main.bicep
          parameters: >-
            environmentName=dev
            runtimeMode=${{ inputs.runtimeMode || 'normal' }}
            supabaseUrl=${{ secrets.SUPABASE_URL }}
            supabaseAnonKey=${{ secrets.SUPABASE_ANON_KEY }}
            supabaseServiceRoleKey=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          failOnStdErr: false

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-deploy
          path: api-deploy

      - name: Zip API
        run: cd api-deploy && zip -r ../api.zip . -x "*.git*"

      - name: Deploy API to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.bicep.outputs.apiAppName }}
          package: api.zip

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-deploy
          path: web-deploy

      - name: Zip web
        run: cd web-deploy && zip -r ../web.zip . -x "*.git*"

      - name: Deploy web to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.bicep.outputs.webAppName }}
          package: web.zip

      - name: Smoke test API health
        run: |
          echo "Waiting for API to start..."
          sleep 30
          API_URL="${{ steps.bicep.outputs.apiAppUrl }}/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "API health check failed after 5 attempts"
          exit 1

      - name: Print deployment URLs
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Web:** ${{ steps.bicep.outputs.webAppUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** ${{ steps.bicep.outputs.apiAppUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Storage:** ${{ steps.bicep.outputs.storageAccountName }}" >> $GITHUB_STEP_SUMMARY
