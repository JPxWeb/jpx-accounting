name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
      runtimeMode:
        description: "Runtime mode"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - demo
      assignStorageRoles:
        description: "Create the two storage role assignments in Bicep (needs the deploy SP to hold roleAssignments/write — see docs/DEPLOY_UNBLOCK.md)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.29.2"
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/jpxweb/jpx-accounting-web

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ---- Web: Build & push Docker image to GHCR ----
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest

      # ---- API: Bundle with esbuild ----
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle API for production
        run: |
          mkdir -p api-deploy
          pnpm dlx esbuild services/api/src/index.ts \
            --bundle \
            --platform=node \
            --format=esm \
            --outfile=api-deploy/server.mjs \
            --banner:js="import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
          echo '{"type": "module"}' > api-deploy/package.json

      - name: Upload API artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: api-deploy
          path: api-deploy/
          retention-days: 3

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        id: bicep
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: jpx-main-rg
          template: infra/azure/main.bicep
          parameters: >-
            environmentName=dev
            runtimeMode=${{ inputs.runtimeMode || 'normal' }}
            assignStorageRoles=${{ inputs.assignStorageRoles || 'false' }}
            webDockerImage=${{ env.WEB_IMAGE }}:${{ github.sha }}
            supabaseDbUrl=${{ secrets.SUPABASE_DB_URL }}
            azureOpenaiEndpoint=${{ secrets.AZURE_OPENAI_ENDPOINT }}
            azureOpenaiApiKey=${{ secrets.AZURE_OPENAI_API_KEY }}
            azureOpenaiModel=${{ secrets.AZURE_OPENAI_MODEL }}
            azureDocumentIntelligenceEndpoint=${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}
            azureDocumentIntelligenceApiKey=${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_API_KEY }}
          failOnStdErr: false

      # ---- Deploy API (zip deploy, unchanged) ----
      - name: Download API artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: api-deploy
          path: api-deploy

      - name: Zip API
        run: cd api-deploy && zip -r ../api.zip . -x "*.git*"

      - name: Deploy API to App Service
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ${{ steps.bicep.outputs.apiAppName }}
          package: api.zip

      # ---- Configure web container to pull from GHCR ----
      - name: Configure web app container
        run: |
          az webapp config container set \
            --name ${{ steps.bicep.outputs.webAppName }} \
            --resource-group jpx-main-rg \
            --docker-registry-server-url https://ghcr.io \
            --docker-registry-server-user ${{ github.actor }} \
            --docker-registry-server-password ${{ secrets.GITHUB_TOKEN }} \
            --docker-custom-image-name "${{ env.WEB_IMAGE }}:${{ github.sha }}"

      - name: Restart web app to pull new image
        run: |
          az webapp restart \
            --name ${{ steps.bicep.outputs.webAppName }} \
            --resource-group jpx-main-rg

      # ---- Smoke tests ----
      - name: Smoke test API health
        run: |
          echo "Waiting for API to start..."
          sleep 30
          API_URL="${{ steps.bicep.outputs.apiAppUrl }}/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "API health check failed after 5 attempts"
          exit 1

      - name: Smoke test API readiness shape
        run: |
          API_READY="${{ steps.bicep.outputs.apiAppUrl }}/ready"
          for i in 1 2 3 4 5; do
            READY_JSON=$(curl -sf "$API_READY" || true)
            if echo "$READY_JSON" | jq -e 'has("ready") and has("checks") and has("runtimeMode")' >/dev/null 2>&1; then
              echo "/ready probe passed"
              exit 0
            fi
            echo "Attempt $i: /ready not valid yet, retrying in 10s..."
            sleep 10
          done
          echo "/ready probe failed; last payload:"
          echo "$READY_JSON"
          exit 1

      - name: Smoke test web app
        run: |
          echo "Waiting for container to pull and start..."
          sleep 60
          WEB_URL="${{ steps.bicep.outputs.webAppUrl }}"
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WEB_URL" || true)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Web health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Web app returned non-200. Fetching response body:"
          curl -s "$WEB_URL" | head -100
          echo ""
          echo "=== Downloading Azure application logs ==="
          az webapp log download \
            --name ${{ steps.bicep.outputs.webAppName }} \
            --resource-group jpx-main-rg \
            --log-file /tmp/webapp-logs.zip 2>&1 || true
          if [ -f /tmp/webapp-logs.zip ]; then
            cd /tmp && unzip -o webapp-logs.zip 2>/dev/null || true
            echo "=== Docker container logs ==="
            find /tmp/LogFiles -name "*.log" -exec echo "--- {} ---" \; -exec tail -60 {} \; 2>/dev/null || echo "No log files found"
          fi
          echo "=== Done ==="
          exit 1

      - name: Print deployment URLs
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Web:** ${{ steps.bicep.outputs.webAppUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** ${{ steps.bicep.outputs.apiAppUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Storage:** ${{ steps.bicep.outputs.storageAccountName }}" >> $GITHUB_STEP_SUMMARY
