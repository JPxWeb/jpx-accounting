name: Deploy

# Push-to-main deploys are gated on a green CI run (workflow_run) so broken code cannot
# reach Azure in parallel with typecheck/unit/build/E2E. Manual workflow_dispatch bypasses
# the gate for hotfixes — use sparingly.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
      runtimeMode:
        description: "Runtime mode"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - demo
      assignStorageRoles:
        description: "Create the two storage role assignments in Bicep (needs the deploy SP to hold roleAssignments/write — see docs/DEPLOY_UNBLOCK.md)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      deploySha:
        description: "Rollback path: full 40-char git SHA to build and deploy. Leave empty to deploy the current ref."
        required: false
        default: ""
        type: string

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.29.2"
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/jpxweb/jpx-accounting-web
  # Must stay in sync with main.bicep namePrefix + environmentName for dev.
  WEB_ORIGIN: https://jpxacct-dev-web.azurewebsites.net
  # Single source for the SHA being deployed: explicit rollback input > CI-validated SHA > current ref.
  DEPLOY_SHA: ${{ inputs.deploySha || github.event.workflow_run.head_sha || github.sha }}

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    # Generous: includes a cold-cache Next.js docker build + pnpm install + bundle + boot smoke.
    timeout-minutes: 30
    # workflow_run fires on every CI completion — skip failed runs unless manually dispatched.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Validate rollback SHA
        if: github.event_name == 'workflow_dispatch' && inputs.deploySha != ''
        run: |
          if ! echo "${{ inputs.deploySha }}" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::deploySha must be a full 40-character lowercase git SHA."
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Rollback input > workflow_run's CI-validated SHA > dispatch's selected ref.
          ref: ${{ env.DEPLOY_SHA }}

      # ---- Web: Build & push Docker image to GHCR ----
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_ACCOUNTING_RUNTIME_MODE=${{ github.event_name == 'workflow_dispatch' && inputs.runtimeMode || 'normal' }}
            NEXT_PUBLIC_API_BASE_URL=/api-proxy
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.DEPLOY_SHA }}
            ${{ env.WEB_IMAGE }}:latest

      # ---- API: Bundle with esbuild ----
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # esbuild is a pinned root devDependency and the bundle command lives in the root
      # `bundle:api` script so CI and local runs produce the identical artifact.
      # CommonJS, not ESM: @azure/identity → `open` uses __dirname; https-proxy-agent dynamic-
      # require() also breaks under esbuild --format=esm (Azure API 503 / crash loop).
      - name: Bundle API for production
        run: corepack pnpm bundle:api

      # Boot the exact artifact that ships. Catches the bundle-only crash-loop class (ESM/dynamic
      # require breakage) before anything reaches Azure.
      - name: Boot-smoke the API bundle
        run: |
          ACCOUNTING_RUNTIME_MODE=demo PORT=3401 node api-deploy/server.cjs &
          SERVER_PID=$!
          if curl --silent --fail --retry 15 --retry-delay 1 --retry-connrefused --retry-all-errors http://127.0.0.1:3401/health; then
            echo ""
            echo "Bundle boot smoke passed"
            kill "$SERVER_PID"
          else
            echo "::error::Bundled server.cjs did not serve /health — this artifact would crash-loop on Azure."
            kill "$SERVER_PID" 2>/dev/null || true
            exit 1
          fi

      - name: Upload API artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: api-deploy
          path: api-deploy/
          retention-days: 3

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    environment: dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # THE fail-closed gate for the advisor HMAC: Bicep cannot express this check without the
      # experimental assertions feature (the former function-call assert() never compiled), so this
      # step is the sole enforcement point — it must run before the ARM deployment below.
      - name: Reject demo advisor HMAC in normal mode
        if: (github.event_name == 'workflow_dispatch' && inputs.runtimeMode == 'normal') || (github.event_name == 'workflow_run')
        run: |
          DEMO_SECRET="jpx-demo-advisor-tool-approval-secret"
          DEPLOY_SECRET="${{ secrets.ADVISOR_TOOL_APPROVAL_SECRET }}"
          RUNTIME="${{ github.event_name == 'workflow_dispatch' && inputs.runtimeMode || 'normal' }}"
          if [ "$RUNTIME" = "normal" ]; then
            if [ -z "$DEPLOY_SECRET" ] || [ "$DEPLOY_SECRET" = "$DEMO_SECRET" ]; then
              echo "::error::ADVISOR_TOOL_APPROVAL_SECRET must be set to a non-demo value for normal mode (configure the GitHub secret)."
              exit 1
            fi
          fi

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@a1361c2c2cd398621955b16ca32e01c65ea340f5 # v2
        id: bicep
        with:
          scope: resourceGroup
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: jpx-main-rg
          template: infra/azure/main.bicep
          parameters: >-
            environmentName=dev
            runtimeMode=${{ github.event_name == 'workflow_dispatch' && inputs.runtimeMode || 'normal' }}
            assignStorageRoles=${{ github.event_name == 'workflow_dispatch' && inputs.assignStorageRoles || 'false' }}
            webDockerImage=${{ env.WEB_IMAGE }}:${{ env.DEPLOY_SHA }}
            supabaseDbUrl=${{ secrets.SUPABASE_DB_URL }}
            azureOpenaiEndpoint=${{ secrets.AZURE_OPENAI_ENDPOINT }}
            azureOpenaiApiKey=${{ secrets.AZURE_OPENAI_API_KEY }}
            azureOpenaiModel=${{ secrets.AZURE_OPENAI_MODEL }}
            azureDocumentIntelligenceEndpoint=${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}
            azureDocumentIntelligenceApiKey=${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_API_KEY }}
            advisorToolApprovalSecret=${{ secrets.ADVISOR_TOOL_APPROVAL_SECRET }}
            supabaseJwksUrl=${{ secrets.SUPABASE_JWKS_URL }}
            supabaseJwtAlgs=${{ secrets.SUPABASE_JWT_ALGS }}
            accountingCorsOrigins=${{ env.WEB_ORIGIN }}
            storageCorsAllowedOrigins=${{ env.WEB_ORIGIN }},http://localhost:3002,http://localhost:3200
            supabasePoolerTransactionMode=false
          # failOnStdErr was masking ARM/Bicep validation errors — let stderr fail the step.
          failOnStdErr: true

      # ---- Deploy API (zip deploy, unchanged) ----
      - name: Download API artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: api-deploy
          path: api-deploy

      - name: Zip API
        run: cd api-deploy && zip -r ../api.zip . -x "*.git*"

      - name: Deploy API to App Service
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ${{ steps.bicep.outputs.apiAppName }}
          package: api.zip

      # ---- Configure web container to pull from GHCR ----
      # GITHUB_TOKEN expires when the workflow ends; Azure restarts need a persistent PAT
      # (GitHub → Settings → Developer settings → PAT classic → read:packages) in GHCR_PULL_TOKEN.
      - name: Configure web app container
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [ -z "$GHCR_PULL_TOKEN" ]; then
            echo "::error::GHCR_PULL_TOKEN is required — Azure App Service cannot pull the private ghcr.io/jpxweb/jpx-accounting-web image with an expired GITHUB_TOKEN. Create a PAT with read:packages and add it as a GitHub Actions secret."
            exit 1
          fi
          az webapp config container set \
            --name ${{ steps.bicep.outputs.webAppName }} \
            --resource-group jpx-main-rg \
            --container-registry-url https://ghcr.io \
            --container-registry-user ${{ github.repository_owner }} \
            --container-registry-password "$GHCR_PULL_TOKEN" \
            --container-image-name "${{ env.WEB_IMAGE }}:${{ env.DEPLOY_SHA }}"

      - name: Restart web app to pull new image
        run: |
          az webapp restart \
            --name ${{ steps.bicep.outputs.webAppName }} \
            --resource-group jpx-main-rg

      # ---- Smoke tests ----
      - name: Smoke test API health
        run: |
          echo "Waiting for API to start..."
          sleep 30
          API_URL="${{ steps.bicep.outputs.apiAppUrl }}/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "API health check failed after 5 attempts"
          exit 1

      - name: Smoke test API readiness
        run: |
          API_READY="${{ steps.bicep.outputs.apiAppUrl }}/ready"
          for i in 1 2 3 4 5; do
            READY_JSON=$(curl -sf "$API_READY" || true)
            if echo "$READY_JSON" | jq -e '.ready == true and (.checks.ledger == true) and (.checks.ai == true)' >/dev/null 2>&1; then
              echo "/ready probe passed (ready=true, ledger+ai checks green)"
              exit 0
            fi
            echo "Attempt $i: /ready not green yet, retrying in 10s..."
            echo "Last payload: $READY_JSON"
            sleep 10
          done
          echo "/ready probe failed — API is fail-closed or still starting"
          echo "$READY_JSON"
          exit 1

      - name: Smoke test web app
        run: |
          echo "Waiting for container to pull and start..."
          sleep 60
          WEB_URL="${{ steps.bicep.outputs.webAppUrl }}"
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WEB_URL" || true)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Web health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Web app returned non-200. Fetching response body:"
          curl -s "$WEB_URL" | head -100
          echo ""
          echo "=== Downloading Azure application logs ==="
          az webapp log download \
            --name ${{ steps.bicep.outputs.webAppName }} \
            --resource-group jpx-main-rg \
            --log-file /tmp/webapp-logs.zip 2>&1 || true
          if [ -f /tmp/webapp-logs.zip ]; then
            cd /tmp && unzip -o webapp-logs.zip 2>/dev/null || true
            echo "=== Docker container logs ==="
            find /tmp/LogFiles -name "*.log" -exec echo "--- {} ---" \; -exec tail -60 {} \; 2>/dev/null || echo "No log files found"
          fi
          echo "=== Done ==="
          exit 1

      - name: Print deployment URLs
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Web:** ${{ steps.bicep.outputs.webAppUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** ${{ steps.bicep.outputs.apiAppUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Storage:** ${{ steps.bicep.outputs.storageAccountName }}" >> $GITHUB_STEP_SUMMARY

  # Closes the "deploy skipped/failed silently for weeks" hole: any red job files/updates an issue.
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: failure()
    timeout-minutes: 15
    permissions:
      issues: write
    steps:
      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TITLE="CI/deploy failure on ${{ github.workflow }}"
          BODY="Workflow **${{ github.workflow }}** failed for \`${{ env.DEPLOY_SHA }}\` (event: ${{ github.event_name }}).

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EXISTING=$(gh issue list --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
